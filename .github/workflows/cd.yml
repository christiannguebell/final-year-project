name: Backend CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      HAS_DOCKER_SECRETS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.HAS_DOCKER_SECRETS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./seas-backend
          push: ${{ env.HAS_DOCKER_SECRETS == 'true' }}
          tags: ${{ env.HAS_DOCKER_SECRETS == 'true' && format('{0}/seas-backend:latest', secrets.DOCKERHUB_USERNAME) || 'seas-backend:latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Placeholder for deployment step
      - name: Deploy to Server
        run: echo "Add deployment commands here (e.g., ssh into server and run docker-compose pull && docker-compose up -d)"
