name: SEAS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./seas-backend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './seas-backend/pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run Linter
        run: pnpm run lint
      - name: Run Tests
        run: pnpm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
      - name: Build Check
        run: pnpm run build

  admin-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./seas-admin
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './seas-admin/pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run Linter
        run: pnpm run lint
      - name: Type Check
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Build Check
        run: pnpm run build

  public-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./seas-public
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './seas-public/pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run Linter
        run: pnpm run lint
      - name: Type Check
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Build Check
        run: pnpm run build
