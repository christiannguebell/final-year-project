apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: seas
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          # Replace YOUR_GCP_PROJECT_ID with your actual Google Cloud project ID
          image: gcr.io/YOUR_GCP_PROJECT_ID/seas-admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
