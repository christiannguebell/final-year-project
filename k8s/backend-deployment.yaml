apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: seas
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace YOUR_GCP_PROJECT_ID with your actual Google Cloud project ID
          # This image is built and pushed by the GitHub Actions CI/CD workflow
          image: gcr.io/YOUR_GCP_PROJECT_ID/seas-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: seas-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seas-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: seas-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: seas-secrets
                  key: JWT_REFRESH_SECRET
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seas-secrets
                  key: SMTP_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: uploads-storage
          emptyDir: {}
          # Note: emptyDir is temporary. For production uploads that persist across
          # pod restarts, create a separate PVC for uploads (similar to postgres-pvc.yaml).
