apiVersion: v1
kind: ConfigMap
metadata:
  name: seas-config
  namespace: seas
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "seas_db"
  DB_USER: "openpg"
  JWT_EXPIRES_IN: "7d"
  JWT_REFRESH_EXPIRES_IN: "30d"
  UPLOAD_DIR: "uploads"
  MAX_FILE_SIZE: "5242880"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  SKIP_EMAIL: "false"
  # Update CORS_ORIGIN and FRONTEND_URL after you get your GKE external IP or domain
  CORS_ORIGIN: "http://localhost:3000"
  FRONTEND_URL: "http://localhost:3000"
  EMAIL_FROM: "noreply@seas-exam.local"
  # Brevo SMTP Relay — free plan: 300 emails/day
  SMTP_HOST: "smtp-relay.brevo.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  # SMTP_USER = your Brevo account email (not sensitive, goes in ConfigMap)
  SMTP_USER: "b02703001@smtp-brevo.com"
  # SMTP_PASSWORD goes in secrets.yaml (it's the Brevo SMTP key)
