apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seas-ingress
  namespace: seas
  annotations:
    # Use GKE's built-in nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Increase proxy timeouts for the API
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "90"
spec:
  rules:
    - http:
        paths:
          # /api routes → backend (Node.js API)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 3000

          # /admin routes → admin portal (nginx serving React)
          - path: /admin(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin-service
                port:
                  number: 80

          # / (root) → public portal (nginx serving React)
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: public-service
                port:
                  number: 80
