# This is a TEMPLATE — do not put real values here.
# Copy this file to secrets.yaml and fill in your base64-encoded values.
# secrets.yaml is in .gitignore and must NEVER be committed to Git.
#
# How to base64-encode a value on Windows PowerShell:
#   [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("your-value"))
#
# How to base64-encode on Linux/Mac:
#   echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: seas-secrets
  namespace: seas
type: Opaque
data:
  DB_PASSWORD: <base64-encoded-db-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
  JWT_REFRESH_SECRET: <base64-encoded-jwt-refresh-secret>
